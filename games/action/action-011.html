<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹球消砖 - GameHub100</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #1e3c72; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; margin: 10px 0; }
        .stat { background: #2a5298; color: white; padding: 8px 15px; border-radius: 8px; }
        canvas { border: 2px solid #1e3c72; border-radius: 8px; display: block; margin: 10px auto; }
        .btn {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { background: #2a5298; }
        .back { display: block; margin-top: 15px; color: #1e3c72; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎱 弹球消砖</h1>
        <div class="stats">
            <div class="stat">分数: <span id="score">0</span></div>
            <div class="stat">生命: <span id="lives">3</span></div>
        </div>
        <canvas id="game" width="400" height="400"></canvas>
        <button class="btn" onclick="start()">开始游戏</button>
        <a href="../index.html" class="back">← 返回游戏列表</a>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let lives = 3;
        let running = false;

        const paddle = { x: 150, y: 380, w: 100, h: 10 };
        const ball = { x: 200, y: 350, r: 8, dx: 3, dy: -3 };
        const bricks = [];
        const brickW = 70, brickH = 20;

        function initBricks() {
            bricks.length = 0;
            const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db'];
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    bricks.push({
                        x: 25 + col * 75,
                        y: 30 + row * 25,
                        w: brickW,
                        h: brickH,
                        color: colors[row],
                        alive: true
                    });
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            
            // 挡板
            ctx.fillStyle = '#1e3c72';
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            
            // 球
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = '#2a5298';
            ctx.fill();
            
            // 砖块
            bricks.forEach(b => {
                if (b.alive) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            });
        }

        function update() {
            if (!running) return;
            
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // 边界碰撞
            if (ball.x <= ball.r || ball.x >= 400 - ball.r) ball.dx = -ball.dx;
            if (ball.y <= ball.r) ball.dy = -ball.dy;
            
            // 挡板碰撞
            if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                ball.dy = -Math.abs(ball.dy);
            }
            
            // 掉落
            if (ball.y > 400) {
                lives--;
                document.getElementById('lives').textContent = lives;
                if (lives <= 0) {
                    running = false;
                    alert('游戏结束！分数: ' + score);
                    return;
                }
                ball.x = 200;
                ball.y = 350;
            }
            
            // 砖块碰撞
            bricks.forEach(b => {
                if (b.alive && ball.x >= b.x && ball.x <= b.x + b.w && ball.y >= b.y && ball.y <= b.y + b.h) {
                    b.alive = false;
                    ball.dy = -ball.dy;
                    score += 10;
                    document.getElementById('score').textContent = score;
                }
            });
            
            // 胜利检查
            if (bricks.every(b => !b.alive)) {
                running = false;
                alert('🎉 恭喜通关！分数: ' + score);
                return;
            }
            
            draw();
            requestAnimationFrame(update);
        }

        canvas.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = e.clientX - rect.left - paddle.w / 2;
            paddle.x = Math.max(0, Math.min(300, paddle.x));
        };

        function start() {
            score = 0;
            lives = 3;
            ball.x = 200;
            ball.y = 350;
            ball.dx = 3;
            ball.dy = -3;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            initBricks();
            running = true;
            update();
        }

        initBricks();
        draw();
    </script>
</body>
</html>
